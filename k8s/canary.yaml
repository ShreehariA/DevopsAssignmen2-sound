apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-web-stable
  namespace: aceest
spec:
  replicas: 3
  selector:
    matchLabels:
      app: aceest-web-canary
      track: stable
  template:
    metadata:
      labels:
        app: aceest-web-canary
        track: stable
    spec:
      containers:
        - name: web
          image: your-dockerhub-username/aceest-fitness:stable
          ports:
            - containerPort: 8000
          env:
            - name: APP_VERSION
              value: "stable"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-web-canary
  namespace: aceest
spec:
  replicas: 1
  selector:
    matchLabels:
      app: aceest-web-canary
      track: canary
  template:
    metadata:
      labels:
        app: aceest-web-canary
        track: canary
    spec:
      containers:
        - name: web
          image: your-dockerhub-username/aceest-fitness:canary
          ports:
            - containerPort: 8000
          env:
            - name: APP_VERSION
              value: "canary"
---
apiVersion: v1
kind: Service
metadata:
  name: aceest-web-canary
  namespace: aceest
spec:
  selector:
    app: aceest-web-canary
  ports:
    - name: http
      port: 80
      targetPort: 8000
  type: ClusterIP
