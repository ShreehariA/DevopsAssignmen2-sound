apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-web-blue
  namespace: aceest
spec:
  replicas: 2
  selector:
    matchLabels:
      app: aceest-web
      track: blue
  template:
    metadata:
      labels:
        app: aceest-web
        track: blue
    spec:
      containers:
        - name: web
          image: your-dockerhub-username/aceest-fitness:blue
          ports:
            - containerPort: 8000
          env:
            - name: APP_VERSION
              value: "blue"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-web-green
  namespace: aceest
spec:
  replicas: 0
  selector:
    matchLabels:
      app: aceest-web
      track: green
  template:
    metadata:
      labels:
        app: aceest-web
        track: green
    spec:
      containers:
        - name: web
          image: your-dockerhub-username/aceest-fitness:green
          ports:
            - containerPort: 8000
          env:
            - name: APP_VERSION
              value: "green"
---
apiVersion: v1
kind: Service
metadata:
  name: aceest-web-bg
  namespace: aceest
spec:
  selector:
    app: aceest-web
    track: blue
  ports:
    - name: http
      port: 80
      targetPort: 8000
  type: ClusterIP
